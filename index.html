<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>辞書表示サンプル</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .entry { border-bottom: 1px solid #ccc; margin-bottom: 20px; padding-bottom: 10px; }
        .headword { font-size: 1.5em; font-weight: bold; }
        .pronunciation { color: gray; margin-left: 10px; }
        .part-of-speech { font-style: italic; color: #555; }
        .definition { margin-left: 20px; margin-top: 5px; }
        .examples { margin-left: 40px; color: #333; }
        .conjugation, .related-words, .tags { margin-left: 20px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>辞書エントリー</h1>
    <div id="dictionary"></div>
    <script src="node.js"></script>
</body>
</html>
